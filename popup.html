<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --ink:      #14161c;
    --surface:  #1b1e27;
    --line:     #2c3140;
    --text:     #e9e6dd;
    --muted:    #888fa0;
    --accent:   #e0a458;
    --accent-d: #c98c3c;
    --ok:       #7fd1a3;
    --warn:     #e08a6e;
    --mono: "JetBrains Mono", "SF Mono", "Cascadia Code", "Fira Code",
            ui-monospace, Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }

  html, body { margin: 0; }

  body {
    width: 340px;
    background: var(--ink);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.45;
    padding: 0;
  }

  .bar { height: 3px; background: linear-gradient(90deg, var(--accent), transparent 70%); }

  .wrap { padding: 16px 16px 18px; }

  /* staggered entrance */
  .stagger { opacity: 0; transform: translateY(4px); animation: rise .35s ease forwards; }
  .stagger:nth-child(1) { animation-delay: .02s; }
  .stagger:nth-child(2) { animation-delay: .08s; }
  .stagger:nth-child(3) { animation-delay: .14s; }
  .stagger:nth-child(4) { animation-delay: .20s; }
  .stagger:nth-child(5) { animation-delay: .26s; }
  @keyframes rise { to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) {
    .stagger { animation: none; opacity: 1; transform: none; }
  }

  h1 {
    margin: 0 0 2px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
  }
  h1 .dot { color: var(--accent); }

  .sub { margin: 0 0 14px; color: var(--muted); font-size: 11px; letter-spacing: .02em; }

  label { display: block; color: var(--muted); font-size: 11px; margin: 0 0 5px; letter-spacing: .04em; }

  .field { position: relative; margin-bottom: 14px; }
  .field::before {
    content: "›";
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--accent); font-weight: 700;
  }
  input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12.5px;
    padding: 9px 10px 9px 24px;
    border-radius: 6px;
    outline: none;
  }
  input:focus { border-color: var(--accent-d); box-shadow: 0 0 0 2px rgba(224,164,88,.16); }

  button {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .05em;
    border-radius: 6px;
    cursor: pointer;
    width: 100%;
    padding: 10px;
    transition: filter .12s ease, background .12s ease;
  }
  button:active { transform: translateY(1px); }

  #scrape {
    background: var(--accent);
    color: #1a1206;
    border: 1px solid var(--accent-d);
    text-transform: uppercase;
  }
  #scrape:hover { filter: brightness(1.06); }
  #scrape:disabled { opacity: .55; cursor: default; }

  #grant {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent-d);
    margin-bottom: 10px;
  }
  #grant:hover { background: rgba(224,164,88,.10); }
  #grant[hidden] { display: none; }

  .status {
    margin-top: 13px;
    min-height: 16px;
    font-size: 11.5px;
    color: var(--muted);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .status[data-kind="ok"]   { color: var(--ok); }
  .status[data-kind="warn"] { color: var(--warn); }
  .status[data-kind="busy"] { color: var(--accent); }

  .hint {
    margin-top: 12px;
    padding-top: 11px;
    border-top: 1px solid var(--line);
    color: var(--muted);
    font-size: 10.5px;
    line-height: 1.5;
  }
  kbd {
    font-family: var(--mono);
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 10px;
    color: var(--text);
  }
</style>
</head>
<body>
  <div class="bar"></div>
  <div class="wrap">
    <h1 class="stagger">URL SCRAPER<span class="dot">.</span></h1>
    <p class="sub stagger">Highlighted tabs &rarr; one merged text file</p>

    <div class="field stagger">
      <label for="base">BASE URL FILTER</label>
      <input id="base" type="text" placeholder="https://www.example.com/gallery/" spellcheck="false" autocomplete="off">
    </div>

    <button id="grant" class="stagger" hidden>Grant access to sites</button>
    <button id="scrape" class="stagger">Scrape highlighted tabs</button>

    <div id="status" class="status stagger"></div>

    <div class="hint">
      Select tabs first: hold <kbd>Ctrl</kbd> / <kbd>Cmd</kbd> and click each tab,
      or <kbd>Shift</kbd>+click a range. Then open this and scrape.
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
